<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      function fn(...arrays) {
        if (arrays.length === 0) return [];
        if (arrays.length === 1) return arrays[0];
        let result = Array.from(new Set(arrays[0]));
        for (let i = 1; i < arrays.length; i++) {
          const cur = new Set(arrays[i]);
          result = result.filter((item) => cur.has(item));
          if (result.length === 0) break;
        }
        return result;
      }
      const arr1 = [1, 2, 3, 4, 5];
      const arr2 = [3, 4, 5, 6, 7, 8];
      const arr3 = [5, 8, 9, 10, 11];
      console.log(fn(arr1, arr2, arr3));
    </script>
  </body>
</html>
