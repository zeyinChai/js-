<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      // 请求
      // {
      //   "jsonrpc": "2.0",
      //   "method": "tools/list",
      //   "id": 1
      // }

      // mcp响应
      // {
      //   "jsonrpc": "2.0",
      //   "result": {
      //     "tools": [...]
      //   },
      //   "id": 1
      // }

      // MCP（Model Context Protocol）是一个让 AI 模型标准化访问外部工具和数据的协议。
      // 它底层基于 JSON-RPC 2.0 作为通信格式，但在此之上定义了一套工具发现、工具调用、资源访问等规范。
      // 本质上它解决的是模型与外部系统之间的能力扩展问题。
    </script>
  </body>
</html>
