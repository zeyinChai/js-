<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        // XSS（跨站脚本攻击）是攻击者把恶意 JavaScript 注入到页面中，在受害者浏览器执行。
        // 本质：浏览器把“用户输入”当成“代码执行”。
        // 怎么防：
            // 1. 使用框架（比如 React 默认会转义） 
            // 2. 禁止使用 innerHTML

        // CSRF（跨站请求伪造）是攻击者诱导用户在已登录状态下，向受信任网站发送恶意请求。
        // 1.恶意网站用 form表单提交 无视跨域，因为是表单提交
        // 2.因为form提交不会出现跨域，所以会自动携带cookie
        // 本质：浏览器会自动携带 Cookie
        // 怎么防 CSRF：让服务器知道“请求是不是你页面发的”。
            // 1. 最好是token存在localstoage里，页面提交时带上token
            // 2. 浏览器跨站请求不带 Cookie。
            // 3. 核心链路需要用户输入验证码
            // 4. 判断refer网站来源

        // "SameSite 是防御 CSRF 的重要属性：
        // Strict：最安全，只能同站发送，但用户体验差（从谷歌点过来都未登录）
        // Lax（默认）：平衡方案
        // ✅ 发送：同站请求、跨站 GET 链接
        // ❌ 不发送：跨站 POST、图片、AJAX
        // 实际开发中：
        // - 普通登录用 Lax 就够了
        // - 支付回调等必须跨站用 None
        // - 银行类敏感应用用 Strict"
    </script>
</body>
</html>
